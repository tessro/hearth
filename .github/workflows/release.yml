name: Release
run-name: Release ${{ inputs.bump }}${{ inputs.dry_run && ' [dry run]' || '' }}

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version component to increment
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
      dry_run:
        description: Dry run
        required: true
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: stable-release
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-24.04
    outputs:
      base_sha: ${{ steps.candidate.outputs.base_sha }}
      candidate_sha: ${{ steps.candidate.outputs.candidate_sha }}
      version: ${{ steps.candidate.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: cachix/install-nix-action@630ae543ea3a38a9a4166f03376c02c50f408342 # v31
      - run: nix profile install nixpkgs#devenv
      - id: candidate
        name: Create release candidate commit
        env:
          BUMP: ${{ inputs.bump }}
        run: |
          base_sha=$(git rev-parse HEAD)
          devenv shell -- scripts/bump-version.sh "$BUMP"
          version=$(scripts/workspace-version.sh)
          git diff --check
          test "$(git diff --name-only | sort | tr '\n' ' ')" = 'Cargo.lock Cargo.toml '
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add Cargo.toml Cargo.lock
          git commit -m "Release v$version"
          candidate_sha=$(git rev-parse HEAD)
          git branch release-candidate "$candidate_sha"
          git bundle create release-candidate.bundle release-candidate
          {
            echo "base_sha=$base_sha"
            echo "candidate_sha=$candidate_sha"
            echo "version=$version"
          } >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-candidate
          path: release-candidate.bundle
          if-no-files-found: error

  build:
    needs: prepare
    uses: ./.github/workflows/ci.yml
    with:
      source_bundle: release-candidate
      source_sha: ${{ needs.prepare.outputs.candidate_sha }}
    secrets:
      CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
    permissions:
      contents: read

  assemble:
    needs: [prepare, build]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          pattern: '*-release'
          path: dist
          merge-multiple: true
      - uses: cachix/install-nix-action@630ae543ea3a38a9a4166f03376c02c50f408342 # v31
      - name: Checksums and SPDX SBOM
        env:
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          nix profile install nixpkgs#syft
          syft dir:dist -o "spdx-json=dist/hearth-$RELEASE_VERSION.spdx.json"
          cd dist
          sha256sum hearth-*.tar.gz hearth_*.deb hearth-*.rpm hearth-*.spdx.json > SHA256SUMS
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-bundle
          path: dist/*
          if-no-files-found: error

  publish:
    if: ${{ !inputs.dry_run }}
    needs: [prepare, assemble]
    runs-on: ubuntu-24.04
    environment: release
    permissions:
      contents: write
      attestations: write
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: release-candidate
          path: ${{ runner.temp }}/release-candidate
      - name: Check out release candidate
        env:
          CANDIDATE_SHA: ${{ needs.prepare.outputs.candidate_sha }}
        run: scripts/checkout-release-candidate.sh "$RUNNER_TEMP/release-candidate/release-candidate.bundle" "$CANDIDATE_SHA"
      - name: Push tested commit and tag
        env:
          BASE_SHA: ${{ needs.prepare.outputs.base_sha }}
          CANDIDATE_SHA: ${{ needs.prepare.outputs.candidate_sha }}
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          tag="v$RELEASE_VERSION"
          scripts/check-release-tag.sh "$tag"
          remote_main=$(git ls-remote origin refs/heads/main | awk '{print $1}')
          if [ "$remote_main" = "$BASE_SHA" ]; then
            test -z "$(git ls-remote origin "refs/tags/$tag")"
            git tag -a "$tag" "$CANDIDATE_SHA" -m "Hearth $RELEASE_VERSION"
            git push --atomic origin HEAD:refs/heads/main "refs/tags/$tag:refs/tags/$tag"
          elif [ "$remote_main" = "$CANDIDATE_SHA" ]; then
            remote_tag=$(git ls-remote origin "refs/tags/$tag^{}" | awk '{print $1}')
            test "$remote_tag" = "$CANDIDATE_SHA"
          else
            echo "main changed during the release build; refusing to push" >&2
            exit 1
          fi
      - uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: release-bundle
          path: dist
      - uses: actions/attest@c32b4b8b198b65d0bd9d63490e847ff7b53989d4 # v4.0.0
        with:
          subject-path: dist/*
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          tag="v$RELEASE_VERSION"
          if ! gh release view "$tag" >/dev/null 2>&1; then
            gh release create "$tag" --draft --generate-notes --verify-tag
          fi
          gh release upload "$tag" dist/* --clobber
          gh release edit "$tag" --draft=false
