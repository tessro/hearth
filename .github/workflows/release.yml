name: Release

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: read

jobs:
  gate:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - run: scripts/check-release-tag.sh "$GITHUB_REF_NAME"

  build:
    needs: gate
    uses: ./.github/workflows/ci.yml
    permissions:
      contents: read

  publish:
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      attestations: write
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          pattern: '*-release'
          path: dist
          merge-multiple: true
      - uses: cachix/install-nix-action@630ae543ea3a38a9a4166f03376c02c50f408342 # v31
      - name: Checksums and SPDX SBOM
        run: |
          nix profile install nixpkgs#syft
          version=$(scripts/check-release-tag.sh "$GITHUB_REF_NAME")
          syft dir:dist -o "spdx-json=dist/hearth-$version.spdx.json"
          cd dist
          sha256sum hearth-*.tar.gz hearth_*.deb hearth-*.rpm hearth-*.spdx.json > SHA256SUMS
      - uses: actions/attest@c32b4b8b198b65d0bd9d63490e847ff7b53989d4 # v4.0.0
        with:
          subject-path: dist/*
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/* --generate-notes --verify-tag
